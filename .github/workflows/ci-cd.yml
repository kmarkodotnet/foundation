name: CI/CD – Test · Build · Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci-cd:
    name: Test → Build → Deploy
    runs-on: self-hosted

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Backend unit tesztek ────────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore backend/GrantManagement.sln

      - name: Run Domain tests
        run: >
          dotnet test backend/tests/GrantManagement.Domain.Tests
          -c Release --no-restore
          --logger "trx;LogFileName=domain.trx"

      - name: Run Application tests
        run: >
          dotnet test backend/tests/GrantManagement.Application.Tests
          -c Release --no-restore
          --logger "trx;LogFileName=application.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

      # ── 3. Docker ARM64 build ──────────────────────────────────────────────
      - name: Setup QEMU (ARM64 emuláció)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/arm64
          push: false
          outputs: type=docker,dest=grantmanagement-api.tar
          tags: grantmanagement-api:latest

      - name: Build frontend image (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/arm64
          push: false
          outputs: type=docker,dest=grantmanagement-web.tar
          tags: grantmanagement-web:latest

      # ── 4. SSH kulcs előkészítése ──────────────────────────────────────────
      - name: SSH kulcs írása fájlba
        shell: powershell
        env:
          DEPLOY_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          New-Item -ItemType Directory -Force "$env:USERPROFILE\.ssh" | Out-Null
          $keyPath = "$env:USERPROFILE\.ssh\deploy_key"
          if (Test-Path $keyPath) {
            icacls $keyPath /reset | Out-Null
            Remove-Item -Force $keyPath
          }
          [System.IO.File]::WriteAllText($keyPath, $env:DEPLOY_KEY + "`n")
          icacls $keyPath /inheritance:r /grant:r "${env:USERNAME}:(R)" | Out-Null

      # ── 5. Deploy szkript + fájlok másolása az RPi-re ────────────────────
      - name: Deploy szkript előkészítése
        shell: powershell
        run: |
          $lines = @(
            "set -e",
            "cd ~/grant",
            "echo loading backend image...",
            "docker load -i grantmanagement-api.tar",
            "echo loading frontend image...",
            "docker load -i grantmanagement-web.tar",
            "echo starting services...",
            "docker compose up -d --remove-orphans",
            "echo cleanup...",
            "rm -f grantmanagement-api.tar grantmanagement-web.tar",
            "echo running containers:",
            "docker compose ps"
          )
          $script = $lines -join "`n"
          [System.IO.File]::WriteAllText("deploy.sh", $script + "`n", (New-Object System.Text.UTF8Encoding $false))

      - name: SCP – image tar-ok + compose fájl + deploy szkript az RPi-re
        shell: powershell
        run: |
          scp -o StrictHostKeyChecking=no -i "$env:USERPROFILE\.ssh\deploy_key" `
            grantmanagement-api.tar grantmanagement-web.tar docker-compose.yml deploy.sh `
            "${{ secrets.RPI_USER }}@${{ secrets.RPI_HOST }}:~/grant/"

      # ── 6. Deployment az RPi-n ────────────────────────────────────────────
      - name: Deploy – docker load + compose up
        shell: powershell
        run: |
          ssh -o StrictHostKeyChecking=no -i "$env:USERPROFILE\.ssh\deploy_key" `
            "${{ secrets.RPI_USER }}@${{ secrets.RPI_HOST }}" `
            "bash ~/grant/deploy.sh"

      # ── 7. Takarítás ──────────────────────────────────────────────────────
      - name: SSH kulcs törlése
        if: always()
        shell: powershell
        run: |
          $keyPath = "$env:USERPROFILE\.ssh\deploy_key"
          if (Test-Path $keyPath) {
            icacls $keyPath /reset | Out-Null
            Remove-Item -Force $keyPath
          }
