# docker-compose.yml – GrantManagement Docker Compose
# Másolja a .env.example-t .env-be és töltse ki az értékeket!

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: grantmanagement-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - grantnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (.NET 8 API) ─────────────────────────────────────
  backend:
    image: grantmanagement-api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grantmanagement-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD};Pooling=true;
      Jwt__SecretKey:    ${JWT_SECRET}
      Jwt__Issuer:       ${JWT_ISSUER}
      Jwt__ExpirationHours: 8
      Google__ClientId:     ${GOOGLE_CLIENT_ID}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      Smtp__Host:       ${SMTP_HOST}
      Smtp__Port:       ${SMTP_PORT}
      Smtp__UserName:   ${SMTP_USER}
      Smtp__Password:   ${SMTP_PASSWORD}
      Smtp__FromEmail:  ${SMTP_FROM_EMAIL}
      Smtp__FromName:   ${SMTP_FROM_NAME}
      Smtp__UseSsl:     "true"
      FileStorage__BasePath: data/uploads
      AllowedOrigins__0: ${ALLOWED_ORIGIN}
    volumes:
      - uploads:/app/data/uploads
    networks:
      - grantnet
    # A backend belső porton fut (8080), kívülre NEM tesszük ki –
    # az Nginx frontend konténer proxyzza.

  # ── Frontend (Angular + Nginx) ───────────────────────────────
  frontend:
    image: grantmanagement-web:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: grantmanagement-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - grantnet

# ── Volumes ──────────────────────────────────────────────────
volumes:
  postgres_data:
  uploads:

# ── Network ──────────────────────────────────────────────────
networks:
  grantnet:
    driver: bridge
