<div class="gm-page-container">
  <div style="display:flex; align-items:center; margin-bottom:16px">
    <h1 style="margin:0">Pályáztatók</h1>
    <span class="gm-spacer"></span>
    <button
      mat-flat-button
      color="primary"
      routerLink="/granters/new"
      *hasRole="['Admin', 'PalyazatiMunkatars']"
    >
      <mat-icon>add</mat-icon>
      Új pályáztató
    </button>
  </div>

  @if (loading()) {
    <div class="gm-loading-overlay">
      <mat-spinner diameter="48" />
    </div>
  } @else {
    <mat-card>
      <mat-card-content>
        <div class="gm-table-scroll">
        <table mat-table [dataSource]="granters()" style="width:100%">

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Név</th>
            <td mat-cell *matCellDef="let row">
              <a [routerLink]="['/granters', row.id]" style="text-decoration:none; color:inherit; font-weight:500">
                {{ row.name }}
              </a>
            </td>
          </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>E-mail</th>
            <td mat-cell *matCellDef="let row">{{ row.email ?? '–' }}</td>
          </ng-container>

          <ng-container matColumnDef="phoneNumber">
            <th mat-header-cell *matHeaderCellDef>Telefon</th>
            <td mat-cell *matCellDef="let row">{{ row.phoneNumber ?? '–' }}</td>
          </ng-container>

          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Státusz</th>
            <td mat-cell *matCellDef="let row">
              <mat-chip [highlighted]="row.status === 'Active'" [color]="row.status === 'Active' ? 'primary' : undefined">
                {{ row.status === 'Active' ? 'Aktív' : 'Inaktív' }}
              </mat-chip>
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let row">
              <button mat-icon-button matTooltip="Részletek" [routerLink]="['/granters', row.id]">
                <mat-icon>open_in_new</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="columns"></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: columns"
            style="cursor:pointer"
            (click)="openDetail(row.id)"
          ></tr>
        </table>
        </div>

        @if (!granters().length) {
          <div class="gm-empty-state">
            <mat-icon>business</mat-icon>
            <p>Még nincs rögzített pályáztató.</p>
          </div>
        }
      </mat-card-content>
    </mat-card>
  }
</div>
